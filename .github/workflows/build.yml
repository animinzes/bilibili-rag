name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Install Node dependencies
        run: |
          cd frontend
          npm install
          
      - name: Build frontend
        run: |
          cd frontend
          npm run build
          
      - name: Copy frontend build to backend static folder
        run: |
          if (Test-Path "frontend/out") {
            New-Item -ItemType Directory -Force -Path app/static
            Copy-Item -Recurse -Force frontend/out/* app/static/
          }
          
      - name: Create startup script
        run: |
          Set-Content -Path start.bat -Value @"
          @echo off
          echo ============================================
          echo    Bilibili RAG 知识库系统
          echo ============================================
          echo.
          echo 启动服务中...
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          "@
          
          Set-Content -Path run.bat -Value @"
          @echo off
          start cmd /k python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
          timeout /t 2 /nobreak > nul
          start http://localhost:8000
          "@
          
      - name: Create release package
        run: |
          Compress-Archive -Path app,data,assets,logs,start.bat,run.bat,.env.example,requirements.txt -DestinationPath bilibili-rag.zip -Force
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bilibili-rag.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}